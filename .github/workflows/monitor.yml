name: Beyblade Monitor

on:
  schedule:
    # GitHub Actions 排程是「最佳努力」，實際間隔可能比設定值再晚個幾分鐘
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # 允許在 GitHub 網頁上手動點「Run workflow」測試

permissions:
  contents: write   # 需要寫入權限才能把 state.json commit 回 repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update monitor state [skip ci]"
          git push
